<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine Passport · Tasting &amp; Toasting CAP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,400;1,500&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0c0b0d; --void-2:#121013; --panel:#171318; --panel-2:#1d181e;
  --wine:#6b2737; --cream:#f4eee6; --cream-soft:#cbbfb0;
  --gold:#cba24f; --gold-soft:#e0c486; --green:#86a878; --coral:#c66a7c;
  --line:#2c252e; --ink-dim:#86807f;
  --serif:"Playfair Display", Georgia, serif;
  --body:"Spectral", Georgia, serif;
  --mono:"Spline Sans Mono", ui-monospace, monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{ background:var(--void); color:var(--cream); font-family:var(--body); font-weight:300; line-height:1.6; -webkit-font-smoothing:antialiased; }
.mono{ font-family:var(--mono); text-transform:uppercase; letter-spacing:.2em; font-size:10px; color:var(--ink-dim); }
.wrap{ max-width:960px; margin:0 auto; padding:0 28px; }
.navbar{ border-bottom:1px solid var(--line); background:rgba(12,11,13,.9); position:sticky; top:0; z-index:50; backdrop-filter:blur(10px); }
.navbar .wrap{ display:flex; align-items:center; justify-content:space-between; height:58px; gap:14px; max-width:960px; }
.nb-brand{ font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--cream); }
.nb-brand b{ color:var(--gold-soft); font-weight:600; }
.lang{ display:flex; gap:8px; }
.lang button{ background:none; border:none; cursor:pointer; font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; color:var(--ink-dim); padding:2px 1px; }
.lang button.on{ color:var(--gold-soft); border-bottom:1px solid var(--gold); }
.back{ display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; color:var(--ink-dim); text-decoration:none; margin:30px 0 0; }
.back svg{ width:14px; height:14px; } .back:hover{ color:var(--gold-soft); }
.hero{ padding:26px 0 44px; border-bottom:1px solid var(--line); }
.hero .kick{ margin-bottom:16px; }
.hero h1{ font-family:var(--serif); font-weight:800; font-size:clamp(38px,6.4vw,68px); line-height:1.02; }
.tags{ display:flex; gap:10px; flex-wrap:wrap; margin-top:20px; }
.chip{ font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; color:var(--gold-soft); border:1px solid #4a3a22; background:#1c1610; border-radius:30px; padding:7px 13px; }
.badge{ display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:9.5px; letter-spacing:.16em; border-radius:40px; padding:6px 13px; margin-top:20px; }
.badge svg{ width:13px; height:13px; }
.badge.claimed,.badge.review{ color:var(--gold-soft); border:1px solid #4a3a22; background:#1c1610; }
.badge.verified{ color:var(--green); border:1px solid #3a4a34; background:#141a12; }
.badge.unverified{ color:var(--coral); border:1px solid #4a2630; background:#1c1014; }
section{ padding:48px 0; border-bottom:1px solid var(--line); }
.sec-h{ display:flex; align-items:baseline; gap:14px; margin-bottom:22px; }
.sec-h .idx{ font-family:var(--serif); font-style:italic; color:var(--gold); font-size:19px; }
h2{ font-family:var(--serif); font-weight:700; font-size:clamp(22px,3vw,30px); }
.prose{ color:var(--cream-soft); font-size:17px; max-width:640px; }
.story{ margin-top:18px; font-family:var(--serif); font-style:italic; color:var(--cream); font-size:19px; max-width:640px; }
.vintages{ display:flex; flex-direction:column; gap:12px; }
.vintage{ display:flex; align-items:center; justify-content:space-between; gap:16px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:20px 22px; text-decoration:none; color:inherit; transition:.2s; }
.vintage:hover{ border-color:#4a3a22; background:var(--panel-2); }
.vintage .yr{ font-family:var(--serif); font-size:30px; color:var(--gold-soft); }
.vintage .meta{ margin-top:2px; font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; color:var(--ink-dim); }
.vintage .arrow{ width:18px; height:18px; color:var(--gold); }
footer{ padding:34px 0; text-align:center; }
.state{ padding:120px 28px; text-align:center; color:var(--ink-dim); font-family:var(--mono); font-size:11px; letter-spacing:.18em; }
</style>
</head>
<body>
<nav class="navbar"><div class="wrap">
  <div class="nb-brand">TASTING &amp; TOASTING · <b data-i18n="nav_tag">WINE PASSPORT</b></div>
  <div class="lang"><button data-lang="en">EN</button><button data-lang="pl">PL</button></div>
</div></nav>
<main id="app"><div class="state" data-i18n="loading">LOADING…</div></main>
<script>
const I18N = {
  en:{ nav_tag:"WINE PASSPORT", loading:"LOADING…", notfound:"Wine not found.",
    overview:"About this wine", vintages_title:"Vintages", bottles:"bottles",
    back:"All wines", view_vintage:"View vintage", grape:"Grape",
    b_claimed:"Producer-claimed", b_review:"Under review", b_verified:"Verified", b_unverified:"Unverified",
    color_red:"Red", color_white:"White", color_rose:"Rosé", color_orange:"Orange", color_sparkling:"Sparkling",
    sweet_dry:"Dry", sweet_semi_dry:"Semi-dry", sweet_semi_sweet:"Semi-sweet", sweet_sweet:"Sweet" },
  pl:{ nav_tag:"PASZPORT WINA", loading:"WCZYTYWANIE…", notfound:"Nie znaleziono wina.",
    overview:"O tym winie", vintages_title:"Roczniki", bottles:"butelek",
    back:"Wszystkie wina", view_vintage:"Zobacz rocznik", grape:"Szczep",
    b_claimed:"Deklarowane przez producenta", b_review:"W weryfikacji", b_verified:"Zweryfikowano", b_unverified:"Niezweryfikowano",
    color_red:"Czerwone", color_white:"Białe", color_rose:"Różowe", color_orange:"Pomarańczowe", color_sparkling:"Musujące",
    sweet_dry:"Wytrawne", sweet_semi_dry:"Półwytrawne", sweet_semi_sweet:"Półsłodkie", sweet_sweet:"Słodkie" }
};
const ICO_CHECK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 12l4 4L19 7"/></svg>';
const ICO_SHIELD='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3Z"/></svg>';
const ICO_ARROW='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
const ICO_BACK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 6l-6 6 6 6"/></svg>';

const qs=new URLSearchParams(location.search);
const wineId=qs.get('wineId');
const API=qs.get('api')||(/^(localhost|127\.|0\.0)/.test(location.hostname)?'http://localhost:8088/api/cap':'https://tt-stack-prod.onrender.com/api/cap');
let lang=qs.get('lang')||localStorage.getItem('cap_lang')||((navigator.language||'en').toLowerCase().startsWith('pl')?'pl':'en');
const t=k=>(I18N[lang][k]??I18N.en[k]??k);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function badge(s){const m={verified:['verified','b_verified',ICO_SHIELD],certified:['verified','b_verified',ICO_SHIELD],rejected:['unverified','b_unverified',ICO_SHIELD],claimed:['claimed','b_claimed',ICO_CHECK],documents_submitted:['review','b_review',ICO_CHECK],under_review:['review','b_review',ICO_CHECK]};const[c,k,i]=m[s]||m.claimed;return `<span class="badge ${c}">${i}${t(k)}</span>`;}

async function load(){
  if(!wineId){document.getElementById('app').innerHTML=`<div class="state">${t('notfound')}</div>`;return;}
  let data;
  try{const r=await fetch(`${API}/wines/${encodeURIComponent(wineId)}`);if(!r.ok)throw 0;data=await r.json();}
  catch(e){document.getElementById('app').innerHTML=`<div class="state">${t('notfound')}</div>`;return;}
  const w=data.wine, vs=data.vintages||[];
  const lp=lang==='pl'?'&lang=pl':'';
  const tags=[]; if(w.color) tags.push(t('color_'+w.color)); if(w.sweetness) tags.push(t('sweet_'+w.sweetness)); if(w.appellation) tags.push(w.appellation);
  (w.grape_varieties||[]).forEach(g=>tags.push(g));
  const vHtml=vs.map(v=>`<a class="vintage" href="vintage-passport.html?vintageId=${encodeURIComponent(v.id)}${lp}">
    <div><div class="yr">${esc(v.vintage_year)}</div><div class="meta">${v.bottles_produced?esc(v.bottles_produced)+' '+t('bottles'):''}${v.abv?'&nbsp;·&nbsp;'+esc(v.abv)+'% ABV':''}</div></div>
    <div class="arrow">${ICO_ARROW}</div></a>`).join('');

  document.getElementById('app').innerHTML=`
  <div class="wrap"><a class="back" href="winery-passport.html?slug=stara-winna-gora${lp}">${ICO_BACK}${t('back')}</a></div>
  <header class="hero"><div class="wrap">
    <div class="kick mono">${t('nav_tag')}</div>
    <h1>${esc(w.name)}</h1>
    <div class="tags">${tags.map(x=>`<span class="chip">${esc(x)}</span>`).join('')}</div>
    ${badge(w.verification_status)}
  </div></header>
  <section><div class="wrap">
    <div class="sec-h"><span class="idx">01</span><h2>${t('overview')}</h2></div>
    ${w.description?`<p class="prose">${esc(w.description)}</p>`:''}
    ${w.story_text?`<p class="story">${esc(w.story_text)}</p>`:''}
  </div></section>
  ${vs.length?`<section><div class="wrap">
    <div class="sec-h"><span class="idx">02</span><h2>${t('vintages_title')}</h2></div>
    <div class="vintages">${vHtml}</div></div></section>`:''}
  <footer class="mono">TASTING &amp; TOASTING · CAP</footer>`;
}
function setLang(l){lang=l;localStorage.setItem('cap_lang',l);document.documentElement.lang=l;
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));load();}
document.querySelectorAll('.lang button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
setLang(lang);
</script>
</body>
</html>
