function setLang(l){
 lang=l;
 document.querySelectorAll('.lng').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
 const t=T[l];
 document.getElementById('h-ttl').textContent=t.greeting;
 document.getElementById('h-sub').textContent=t.intro;
 ['s1l','s1q','s1h','s2l','s2q','s2h','s3l','s3q','s3h','s4l','s4q','s4h','s5l','s5q','s5h'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
 ['b1','b2','b3','b4'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t.cont;});
 const b5=document.getElementById('b5');if(b5)b5.textContent=t.send;
 ['bk2','bk3','bk4','bk5'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t.bk;});
 document.getElementById('ty-t').textContent=t.ty_t;
 document.getElementById('ty-b').textContent=t.ty_b;
 buildCards();buildAdaptive();buildFeedback();buildOpen();buildSubmit();
}

function buildCards(){
 const t=T[lang];const g=document.getElementById('cgrid');g.innerHTML='';
 const keys=['dist','win','rest','col','str','inv'];
 t.cards.forEach((c,i)=>{
  const d=document.createElement('div');d.className='card'+(sel2.has(keys[i])?' sel':'');
  d.onclick=()=>{d.classList.toggle('sel');sel2.has(keys[i])?sel2.delete(keys[i]):sel2.add(keys[i]);};
  d.innerHTML=`<div class="cdot"></div><div class="ct">${c[0]}</div><div class="cd">${c[1]}</div>`;
  g.appendChild(d);
 });
}

function mkQs(qs,secLabel){
 let h='';if(secLabel)h+=`<div class="qsec">${secLabel}</div>`;
 qs.forEach(q=>{
  h+=`<div class="qg"><label class="ql">${q[0]}</label>`;
  if(Array.isArray(q[1])){h+=`<div class="opts">`;q[1].forEach(o=>h+=`<span class="opt" onclick="this.classList.toggle('on')">${o}</span>`);h+=`</div>`;}
  else if(q[1]==='number')h+=`<input class="inp" type="number" placeholder="${q[2]||''}" style="height:40px">`;
  else if(q[1]==='text')h+=`<input class="inp" type="text" placeholder="${q[2]||''}" style="height:40px">`;
  else if(q[1]==='textarea')h+=`<textarea class="inp" placeholder="${q[2]||''}" rows="2"></textarea>`;
  h+=`</div>`;
 });return h;
}

function buildAdaptive(){
 const t=T[lang];
 const map=[['qd',t.d,t.sd],['qw',t.w,t.sw],['qr',t.r,t.sr],['qc',t.c,t.sc],['qs',t.str,t.ss],['qi',t.inv,t.si]];
 const keys=['dist','win','rest','col','str','inv'];
 map.forEach(([id,qs,lbl],i)=>{const el=document.getElementById(id);el.innerHTML=mkQs(qs,lbl);el.style.display=sel2.has(keys[i])||sel2.size===0?'block':'none';});
}

function buildFeedback(){document.getElementById('qfeed').innerHTML=mkQs(T[lang].f,null);}
function buildOpen(){document.getElementById('qopen').innerHTML=mkQs(T[lang].o,null);}
function buildSubmit(){
 const t=T[lang];
 const pname=window.location.pathname.split('/')[2]||'';
 const cap=pname?pname.charAt(0).toUpperCase()+pname.slice(1):'Alexander';
 document.getElementById('qsubmit').innerHTML=`<div class="qg"><label class="ql">${t.nl}</label><input class="inp" id="sname" value="${cap}" style="height:42px"></div><div class="qg"><label class="ql">${t.el}</label><input class="inp" id="semail" type="email" placeholder="${t.ep}" style="height:42px"></div><div class="notice">Maksim will respond personally within 24 hours.</div>`;
}

function go(n){
 document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
 if(n===2){const keys=['dist','win','rest','col','str','inv'];const ids=['qd','qw','qr','qc','qs','qi'];ids.forEach((id,i)=>{document.getElementById(id).style.display=sel2.has(keys[i])||sel2.size===0?'block':'none';});}
 const el=document.getElementById('s'+n);if(el)el.classList.add('active');
 const pct={1:20,2:40,3:60,4:80,5:95,6:100}[n]||20;
 document.getElementById('pf').style.width=pct+'%';
}

async function submitForm(){
 const name=document.getElementById('sname')?.value||'Partner';
 const email=document.getElementById('semail')?.value||'';
 const interests=[...sel2];
 const answers=[...document.querySelectorAll('.opt.on')].map(el=>el.textContent);
 const textAnswers=[...document.querySelectorAll('textarea.inp,input.inp[type=text],input.inp[type=number]')].map(el=>({q:el.previousElementSibling?.textContent||'',a:el.value})).filter(x=>x.a);
 const payload={name,email,lang,interests,answers,textAnswers,url:window.location.href,ts:new Date().toISOString()};
 try{await fetch('https://tt-stack-prod.onrender.com/api/partner-interest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}catch(e){console.log('submit',e);}
 const cardKeys=['dist','win','rest','col','str','inv'];
 const cardNames={dist:'Wine Distribution',win:'Winery Connections',rest:'Restaurants & Events',col:'Collector Wine',str:'Strategic Partnership',inv:'Investment'};
 const selectedCards=cardKeys.filter(k=>sel2.has(k)).map(k=>cardNames[k]);

 const qaLines=[];
 document.querySelectorAll('.step:not(#s5):not(#s6) .qg').forEach(group=>{
   const label=group.querySelector('.ql');
   if(!label)return;
   const q=label.textContent.trim();
   const selectedOpts=[...group.querySelectorAll('.opt.on')].map(o=>o.textContent.trim());
   const inp=group.querySelector('input.inp:not([type=email]):not([value="Alexander"]),textarea.inp');
   const textVal=inp&&inp.value.trim()?inp.value.trim():'';
   let answer='';
   if(selectedOpts.length)answer=selectedOpts.join(', ');
   else if(textVal)answer=textVal;
   else answer='—';
   qaLines.push('Q: '+q+'\nA: '+answer);
 });

 const summary=[
   'PARTNER: '+name,
   'EMAIL: '+email,
   'LANGUAGE: '+lang.toUpperCase(),
   'PAGE: '+window.location.href,
   '',
   'INTERESTS SELECTED:',
   selectedCards.length?selectedCards.map(c=>'  • '+c).join('\n'):'  none selected',
   '',
   'RESPONSES:',
   qaLines.join('\n\n')
 ].join('\n');

 try{
   await fetch('https://formspree.io/f/xgobjyre',{
     method:'POST',
     headers:{'Content-Type':'application/json','Accept':'application/json'},
     body:JSON.stringify({_subject:'New CAP partner interest: '+name,name,email,summary})
   });
 }catch(e){console.log('formspree',e);}
 go(6);
}

// Personalize name from URL path
const pname=window.location.pathname.split('/')[2]||'';
if(pname){
 const cap=pname.charAt(0).toUpperCase()+pname.slice(1);
 Object.keys(T).forEach(l=>{
  T[l].greeting=T[l].greeting.replace(/Alexander|Alexandre|Alejandro|Aleksandrze|\u0410\u043b\u0435\u043a\u0441\u0430\u043d\u0434\u0440/g,cap);
  T[l].ty_t=T[l].ty_t.replace(/Alexander|Alexandre|Alejandro|Aleksandrze|\u0410\u043b\u0435\u043a\u0441\u0430\u043d\u0434\u0440/g,cap);
 });
}

const lb=document.getElementById('lbar');
langs.forEach(l=>{const b=document.createElement('button');b.className='lng'+(l==='en'?' on':'');b.dataset.l=l;b.textContent=lnames[l];b.onclick=()=>setLang(l);lb.appendChild(b);});
setLang('en');
</script>
