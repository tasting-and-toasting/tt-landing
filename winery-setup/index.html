<script>
let DATA = null;
const UPLOAD_QS ={"stages": {"pl": "Wgraj zdjęcia / dokumenty etapów", "en": "Upload stage photos / documents", "ru": "Загрузите фото / документы этапов"}, "required_docs": {"pl": "Wgraj przykłady dokumentów (analizy, certyfikaty)", "en": "Upload document samples (analyses, certificates)", "ru": "Загрузите образцы документов (анализы, сертификаты)"}, "qr_place": {"pl": "Wgraj zdjęcia etykiet / butelek", "en": "Upload label / bottle photos", "ru": "Загрузите фото этикеток / бутылок"}, "printer_qr": {"pl": "Wgraj próbki etykiet od drukarni", "en": "Upload label samples from the printer", "ru": "Загрузите образцы этикеток от типографии"}, "human_only": {"pl": "Wgraj przykład takiego dokumentu", "en": "Upload an example of such a document", "ru": "Загрузите пример такого документа"}, "collection_name": {"pl": "Wgraj zdjęcia archiwum / kolekcji", "en": "Upload archive / collection photos", "ru": "Загрузите фото архива / коллекции"}, "wines_special": {"pl": "Wgraj zdjęcia win kolekcjonerskich", "en": "Upload collector wine photos", "ru": "Загрузите фото коллекционных вин"}, "services": {"pl": "Wgraj zdjęcia / menu / cennik", "en": "Upload photos / menu / price list", "ru": "Загрузите фото / меню / прайс"}};
const UPLOAD_UI = {"pl": {"btn": "Dodaj plik", "files": "Pliki", "uploading": "Wysyłanie...", "done": "Wgrano", "err": "Błąd wysyłania", "hint": "PDF, JPG lub PNG, do 15 MB. Możesz dodać kilka."}, "en": {"btn": "Add file", "files": "Files", "uploading": "Uploading...", "done": "Uploaded", "err": "Upload failed", "hint": "PDF, JPG or PNG, up to 15 MB. You can add several."}, "ru": {"btn": "Добавить файл", "files": "Файлы", "uploading": "Загрузка...", "done": "Загружено", "err": "Ошибка загрузки", "hint": "PDF, JPG или PNG, до 15 МБ. Можно несколько."}};
const PRIVACY = {"pl": {"link": "Prywatność i przetwarzanie danych", "title": "Prywatność i przetwarzanie danych", "body": "Ten formularz należy do Tasting & Toasting Inc. (Delaware, USA, nr 7494277). Twoje odpowiedzi i pliki są przesyłane bezpośrednio do założyciela, Maksima Gellera, i wykorzystywane wyłącznie do przygotowania pilotażu cyfrowego paszportu wina (CAP) dla Stara Winna Góra.\\n\\nPliki przechowywane są na prywatnym, zabezpieczonym serwerze (Amazon S3, Europa). Nie są publicznie dostępne. Nie udostępniamy Twoich danych stronom trzecim ani nie wykorzystujemy ich do reklamy.\\n\\nOdpowiedzi zapisują się automatycznie w Twojej przeglądarce, abyś mogła wrócić później. Możesz w każdej chwili poprosić o usunięcie swoich danych, pisząc do nas.\\n\\nTo dokument roboczy do planowania współpracy, nie jest umową prawną."}, "en": {"link": "Privacy & data handling", "title": "Privacy & data handling", "body": "This form belongs to Tasting & Toasting Inc. (Delaware, USA, no. 7494277). Your answers and files go directly to the founder, Maksim Geller, and are used only to prepare the digital wine passport (CAP) pilot for Stara Winna Góra.\\n\\nFiles are stored on a private, secured server (Amazon S3, Europe). They are not publicly accessible. We do not share your data with third parties or use it for advertising.\\n\\nAnswers save automatically in your browser so you can return later. You can ask us to delete your data at any time.\\n\\nThis is a working document for planning the collaboration, not a legal contract."}, "ru": {"link": "Конфиденциальность и данные", "title": "Конфиденциальность и обработка данных", "body": "Эта форма принадлежит Tasting & Toasting Inc. (Делавэр, США, № 7494277). Ваши ответы и файлы идут напрямую основателю, Максиму Геллеру, и используются только для подготовки пилота цифрового паспорта вина (CAP) для Stara Winna Góra.\\n\\nФайлы хранятся на приватном защищённом сервере (Amazon S3, Европа). Они недоступны публично. Мы не передаём ваши данные третьим лицам и не используем для рекламы.\\n\\nОтветы сохраняются автоматически в вашем браузере, чтобы вы могли вернуться позже. Вы можете в любой момент попросить удалить ваши данные.\\n\\nЭто рабочий документ для планирования сотрудничества, не юридический договор."}};
const PWD = {"pl": {"title": "Wprowadź kod dostępu", "hint": "Czterocyfrowy kod, który otrzymałaś od Maksima", "err": "Nieprawidłowy kod", "enter": "Wejdź"}, "en": {"title": "Enter access code", "hint": "The four-digit code you received from Maksim", "err": "Wrong code", "enter": "Enter"}, "ru": {"title": "Введите код доступа", "hint": "Четырёхзначный код от Максима", "err": "Неверный код", "enter": "Войти"}};
const ACCESS_CODE = "2001";
const API_BASE = "https://tt-stack-prod.onrender.com";
const UPLOAD_ENDPOINT = API_BASE+"/api/winery-setup/upload";
const SAVE_ENDPOINT = API_BASE+"/api/winery-setup/save";
const LOAD_ENDPOINT = API_BASE+"/api/winery-setup/load";
const EMAILSCR = {
  pl:{title:"Wprowadź swój email",hint:"Twoje odpowiedzi zapiszą się pod tym adresem i będą dostępne z każdego urządzenia",btn:"Kontynuuj",err:"Wprowadź poprawny adres email",offline:"Brak połączenia z serwerem — używam zapisanej kopii."},
  en:{title:"Enter your email",hint:"Your answers save under this address and are available from any device",btn:"Continue",err:"Enter a valid email address",offline:"No server connection — using your saved copy."},
  ru:{title:"Введите ваш email",hint:"Ваши ответы сохранятся под этим адресом и будут доступны с любого устройства",btn:"Продолжить",err:"Введите корректный адрес email",offline:"Нет связи с сервером — использую сохранённую копию."}
};
function validEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
let loadedEmail='';      // email whose data is currently loaded (for switch detection)
let SECTIONS=[], UI={};
// Question versioning (Variant A — JSON in repo): QV maps qid->version,
// badges maps qid->'new'|'updated' computed once per load.
const QV={};
let badges={};
let changedDismissed=false;
let lang='pl', cur=0;
const KEY='tt_marek_winery_v1';
let state=loadState();
if(!state.token)state.token='swg-'+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
if(!state.files)state.files={};

function loadState(){try{return JSON.parse(localStorage.getItem(KEY))||{ans:{},name:'',email:'',files:{}};}catch(e){return {ans:{},email:'',name:'',files:{}};}}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
// localStorage stays as a fast offline cache; the server (keyed by email) is the
// source of truth. Every saveState writes the cache and debounce-syncs the server.
function saveState(){persist();flash();saveToServer();}

// --- Server persistence (keyed by email) -----------------------------------
let _saveTimer=null;
function saveToServer(){
  if(!state.email||!validEmail(state.email))return; // need a valid email key
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    try{
      const r=await fetch(SAVE_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:state.email,token:state.token,answers:state.ans,files:state.files,seen:state.seen||{}})});
      const j=await r.json().catch(()=>null);
      if(j&&j.ok)flash();
    }catch(e){/* offline → localStorage cache already has it */}
  },800);
}
async function loadFromServer(email){
  try{
    const r=await fetch(LOAD_ENDPOINT+'?email='+encodeURIComponent(email));
    const j=await r.json();
    if(j&&j.ok&&j.found){
      state.ans=j.answers||{};
      state.files=j.files||{};
      state.seen=j.seen||{};
      if(j.token)state.token=j.token;
    }else if(j&&j.ok){ // found:false → fresh start for this email
      state.ans={};state.files={};delete state.seen;
    }
    state.email=email;persist();
  }catch(e){
    // network error → fall back to whatever is cached locally; non-blocking notice
    state.email=email;persist();
    toast((EMAILSCR[lang]||EMAILSCR.en).offline);
  }
}
// Switch the form to a given (already validated, lowercased) email.
async function applyEmail(email){
  loadedEmail=email;
  await questionsReady;
  if(!DATA){renderFail();return;}
  await loadFromServer(email);
  renderForm();
}
function renderForm(){computeBadges();renderLang();markSectionSeen(cur);}
function renderFail(){
  const intro=document.getElementById('u-intro');if(intro)intro.textContent=FAIL_MSG[lang]||FAIL_MSG.en;
  const sec=document.getElementById('sections');if(sec)sec.innerHTML='<div style="padding:20px 0;color:#a08070;font-size:13px">'+(FAIL_MSG[lang]||FAIL_MSG.en)+'</div>';
}
function renderEmailScreen(){
  const e=EMAILSCR[lang]||EMAILSCR.en;
  document.getElementById('e-ttl').textContent=e.title;
  document.getElementById('e-hint').textContent=e.hint;
  document.getElementById('e-btn').textContent=e.btn;
  const inp=document.getElementById('e-inp');if(inp&&!inp.value&&state.email)inp.value=state.email;
}
function submitEmail(){
  const email=(document.getElementById('e-inp').value||'').trim().toLowerCase();
  const e=EMAILSCR[lang]||EMAILSCR.en;
  if(!validEmail(email)){document.getElementById('e-err').textContent=e.err;return;}
  document.getElementById('e-err').textContent='';
  document.getElementById('email-gate').style.display='none';
  document.getElementById('app').style.display='block';
  applyEmail(email);
}

// --- Question versioning ----------------------------------------------------
// Compute new/updated badges once at load, from the seen-version snapshot.
// First-ever run (no state.seen yet): record current versions silently,
// show no badges. Later runs: a question missing from seen is "new"; a
// question whose seen version is older than its current v is "updated".
function computeBadges(){
  badges={};
  const firstRun = !state.seen || Object.keys(state.seen).length===0;
  if(firstRun){
    state.seen={};
    SECTIONS.forEach(s=>s.qs.forEach(q=>{state.seen[q.id]=q.v||1;}));
    persist();
    return;
  }
  SECTIONS.forEach(s=>s.qs.forEach(q=>{
    const v=q.v||1, seen=state.seen[q.id];
    if(seen===undefined) badges[q.id]='new';
    else if(seen<v) badges[q.id]='updated';
  }));
}
// Mark a single question as seen at its current version (on answer).
function markSeenQ(qid){ if(!state.seen)state.seen={}; if(QV[qid]!=null) state.seen[qid]=QV[qid]; }
// Mark all questions in a section as seen (on opening/viewing it).
function markSectionSeen(i){ const s=SECTIONS[i]; if(!s)return; if(!state.seen)state.seen={}; s.qs.forEach(q=>{state.seen[q.id]=QV[q.id]||q.v||1;}); persist(); saveToServer(); }
function changedCount(){ return Object.keys(badges).length; }
function sectionHasBadge(s){ return s.qs.some(q=>badges[q.id]); }
function flash(){const f=document.getElementById('saveflash');f.textContent=UI[lang].save;f.classList.add('show');clearTimeout(window._ft);window._ft=setTimeout(()=>f.classList.remove('show'),1200);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),3500);}

function isAnswered(qid){const v=state.ans[qid];const hasFile=(state.files[qid]||[]).length>0;if(hasFile)return true;if(v==null)return false;if(Array.isArray(v))return v.length>0;return String(v).trim().length>0;}
function sectionDone(sec){return sec.qs.every(q=>isAnswered(q.id));}
function countProgress(){let total=0,done=0;SECTIONS.forEach(s=>s.qs.forEach(q=>{total++;if(isAnswered(q.id))done++;}));return {total,done,pct:Math.round(done/total*100)};}

function renderLang(){
  document.querySelectorAll('.lng').forEach(b=>b.classList.toggle('on',b.dataset.l===lang));
  const u=UI[lang];
  document.getElementById('u-hi').textContent=u.hi;
  document.getElementById('u-intro').textContent=u.intro;
  document.getElementById('genbtn').textContent=u.gen;
  document.getElementById('geninfo').textContent=u.genhint;
  document.getElementById('privacy-link').textContent=PRIVACY[lang].link;
  renderChanged();renderContact();renderMenu();renderSections();renderProgress();
}
function renderChanged(){
  const el=document.getElementById('changed');if(!el)return;
  const n=changedCount();
  if(n===0||changedDismissed){el.style.display='none';return;}
  const tpl=(UI[lang]&&UI[lang].changed)||'{n} new or updated questions';
  el.style.display='flex';
  el.innerHTML='<span>'+tpl.replace('{n}',n)+'</span><button class="x" title="×">×</button>';
  el.querySelector('.x').onclick=()=>{changedDismissed=true;el.style.display='none';};
}
function renderContact(){
  const u=UI[lang];
  document.getElementById('contact').innerHTML=
   '<input class="inp" id="c-name" placeholder="'+u.yourname+'" value="'+(state.name||'Małgorzata')+'">'+
   '<input class="inp" id="c-email" type="email" placeholder="'+u.youremail+' ('+u.optional+')" value="'+(state.email||'')+'">';
  document.getElementById('c-name').oninput=e=>{state.name=e.target.value;saveState();};
  document.getElementById('c-email').oninput=e=>{state.email=e.target.value;saveState();};
  // Changing the email here switches forms: load that email's data (email is the key).
  document.getElementById('c-email').onblur=e=>{
    const ne=(e.target.value||'').trim().toLowerCase();
    if(ne&&validEmail(ne)&&ne!==loadedEmail){applyEmail(ne);}
  };
}
function renderMenu(){
  const m=document.getElementById('menu');m.innerHTML='';
  SECTIONS.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='mitem'+(i===cur?' active':'')+(sectionDone(s)?' done':'');
    const mk=sectionHasBadge(s)?'<span class="mnew" title="new/updated"></span>':'';
    d.innerHTML='<span class="mdot"></span>'+(i+1)+'. '+s.title[lang]+mk;
    d.onclick=()=>{cur=i;markSectionSeen(i);renderSections();renderMenu();window.scrollTo({top:0,behavior:'smooth'});};
    m.appendChild(d);
  });
}
function renderProgress(){const p=countProgress();document.getElementById('pf').style.width=p.pct+'%';document.getElementById('ppct').textContent=UI[lang].progress+' '+p.pct+'%';}
function renderSections(){
  const wrap=document.getElementById('sections');wrap.innerHTML='';
  SECTIONS.forEach((s,i)=>{
    const sec=document.createElement('div');
    sec.className='sec'+(i===cur?' active':'');
    let h='<div class="sec-hd"><div class="sec-ico">'+iconSvg(s.icon)+'</div><div><div class="sec-no">'+UI[lang].menu+' '+(i+1)+' '+UI[lang].of+' '+SECTIONS.length+'</div><div class="sec-ttl">'+s.title[lang]+'</div></div></div>';
    h+='<div class="sec-intro">'+s.intro[lang]+'</div>';
    s.qs.forEach(q=>{h+=renderQ(q);});
    h+='<div class="ask"><div class="ask-lbl">'+UI[lang].ask+'</div><div class="ask-row"><input class="inp" id="ask-'+s.id+'" placeholder="..."><button class="ask-btn" onclick="sendAsk(\''+s.id+'\',\''+s.title[lang].replace(/'/g,"")+'\')">'+UI[lang].asksend+'</button></div></div>';
    h+='<div class="nav">';
    h+= i>0?'<button class="btn btn-ghost" onclick="goSec('+(i-1)+')">'+UI[lang].prev+'</button>':'<span></span>';
    h+= i<SECTIONS.length-1?'<button class="btn" onclick="goSec('+(i+1)+')">'+UI[lang].next+'</button>':'<span></span>';
    h+='</div>';
    sec.innerHTML=h;
    wrap.appendChild(sec);
  });
  bindInputs();renderAllFiles();
}
function renderQ(q){
  const ans=state.ans[q.id];const answered=isAnswered(q.id);
  let h='<div class="qg" data-qid="'+q.id+'">';
  const bd=badges[q.id];
  const bdHtml=bd?'<div class="q-badge '+(bd==='new'?'new':'upd')+'">'+(bd==='new'?UI[lang].new:UI[lang].updated)+'</div>':'';
  h+='<div class="q-top"><div class="q-txt">'+q.q[lang]+'</div><div style="display:flex;gap:6px;align-items:center;flex-shrink:0">'+bdHtml+'<div class="q-req'+(answered?' ok':'')+'">'+(answered?UI[lang].answered:UI[lang].unanswered)+'</div></div></div>';
  h+='<button class="tip-btn" onclick="toggleTip(this)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>'+UI[lang].tip+'</button>';
  h+='<div class="tip-box">'+q.tip[lang]+'</div>';
  if(q.type==='single'||q.type==='multi'){
    h+='<div class="opts">';
    q.opts[lang].forEach((o,idx)=>{
      let on=false;
      if(q.type==='single')on=ans===idx;else on=Array.isArray(ans)&&ans.includes(idx);
      h+='<span class="opt'+(on?' on':'')+'" data-qid="'+q.id+'" data-idx="'+idx+'" data-type="'+q.type+'">'+o+'</span>';
    });
    h+='</div>';
  }else if(q.type==='text'||q.type==='number'){
    h+='<input class="inp" data-qid="'+q.id+'" type="'+(q.type==='number'?'number':'text')+'" value="'+(ans!=null?String(ans).replace(/"/g,'&quot;'):'')+'" placeholder="...">';
  }else if(q.type==='textarea'){
    h+='<textarea class="inp" data-qid="'+q.id+'" rows="2" placeholder="...">'+(ans!=null?String(ans):'')+'</textarea>';
  }
  if(UPLOAD_QS[q.id]){
    const uu=UPLOAD_UI[lang];
    h+='<div class="upl"><label class="upl-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>'+UPLOAD_QS[q.id][lang]+'<input type="file" accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/jpeg,image/png" multiple style="display:none" onchange="handleUpload(event,\''+q.id+'\')"></label><div class="upl-hint">'+uu.hint+'</div><div class="upl-list" id="files-'+q.id+'"></div></div>';
  }
  h+='</div>';
  return h;
}
function bindInputs(){
  document.querySelectorAll('.opt[data-qid]').forEach(el=>{
    el.onclick=()=>{
      const qid=el.dataset.qid, idx=+el.dataset.idx, type=el.dataset.type;
      if(type==='single'){state.ans[qid]=idx;}
      else{if(!Array.isArray(state.ans[qid]))state.ans[qid]=[];const a=state.ans[qid];const p=a.indexOf(idx);if(p>=0)a.splice(p,1);else a.push(idx);}
      markSeenQ(qid);saveState();renderSections();renderMenu();renderProgress();
    };
  });
  document.querySelectorAll('input.inp[data-qid],textarea.inp[data-qid]').forEach(el=>{
    el.oninput=()=>{state.ans[el.dataset.qid]=el.value;markSeenQ(el.dataset.qid);saveState();updateQBadge(el.dataset.qid);renderProgress();};
    el.onblur=()=>{renderMenu();};
  });
}
function updateQBadge(qid){const g=document.querySelector('.qg[data-qid="'+qid+'"] .q-req');if(!g)return;const ok=isAnswered(qid);g.classList.toggle('ok',ok);g.textContent=ok?UI[lang].answered:UI[lang].unanswered;}
function toggleTip(btn){btn.nextElementSibling.classList.toggle('open');}
function goSec(i){cur=i;markSectionSeen(i);renderSections();renderMenu();window.scrollTo({top:0,behavior:'smooth'});}

function renderAllFiles(){SECTIONS.forEach(s=>s.qs.forEach(q=>{if(UPLOAD_QS[q.id])renderFiles(q.id);}));}
function renderFiles(qid){
  const box=document.getElementById('files-'+qid);if(!box)return;
  const list=state.files[qid]||[];box.innerHTML='';
  list.forEach((f,i)=>{
    const d=document.createElement('div');
    d.className='upl-file'+(f.status==='ok'?' ok':'')+(f.status==='err'?' err':'');
    let st=f.status==='ok'?UPLOAD_UI[lang].done:(f.status==='err'?UPLOAD_UI[lang].err:UPLOAD_UI[lang].uploading);
    let openLink=f.signed_url||f.url;
    d.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M13 2v7h7"/></svg><span class="nm">'+f.name+'</span><span class="st">'+st+'</span>'+(f.status==='ok'&&openLink?' <a class="open" href="'+openLink+'" target="_blank">↗</a>':'');
    box.appendChild(d);
  });
}
async function handleUpload(ev,qid){
  const files=[...ev.target.files];ev.target.value='';
  if(!state.files[qid])state.files[qid]=[];
  for(const file of files){
    if(!['application/pdf','image/jpeg','image/png'].includes(file.type)){toast(UPLOAD_UI[lang].err+': '+file.name);continue;}
    if(file.size>15*1024*1024){toast(UPLOAD_UI[lang].err+': >15MB');continue;}
    const rec={name:file.name,status:'up'};
    state.files[qid].push(rec);renderFiles(qid);
    try{
      const fd=new FormData();
      fd.append('file',file);fd.append('token',state.token);fd.append('question',qid);fd.append('original_name',file.name);
      const r=await fetch(UPLOAD_ENDPOINT,{method:'POST',body:fd});
      const j=await r.json();
      if(j.ok){rec.status='ok';rec.url=j.url;rec.signed_url=j.signed_url||null;}
      else{rec.status='err';}
    }catch(e){rec.status='err';}
    markSeenQ(qid);saveState();renderFiles(qid);renderMenu();renderProgress();updateQBadge(qid);
  }
}

function iconSvg(name){
  const I={'ti-plant-2':'<path d="M3 17h18M5 17c0-5 5-7 7-7M19 12c0 2-2 5-7 5M12 22V10"/>','ti-flask':'<path d="M9 3h6M10 3v6l-5 9a2 2 0 0 0 2 3h10a2 2 0 0 0 2-3l-5-9V3"/>','ti-list-numbers':'<path d="M11 6h10M11 12h10M11 18h10M4 6h1v4M4 10h2M6 18H4l2-3H4"/>','ti-qrcode':'<path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z"/>','ti-users':'<path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2M16 3.5a4 4 0 0 1 0 7M21 21v-2a4 4 0 0 0-3-3.8"/>','ti-shield-check':'<path d="M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6zM9 12l2 2 4-4"/>','ti-stamp':'<path d="M8 9V6a4 4 0 0 1 8 0v3M5 21h14M6 21v-3a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v3"/>','ti-books':'<path d="M5 4h3v16H5zM10 4h3v16h-3zM16 5l3 .8L16 21l-3-.8z"/>','ti-shopping-cart':'<path d="M6 6h15l-2 9H8zM6 6L5 3H3M9 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2zM18 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>','ti-glass-full':'<path d="M8 21h8M12 15v6M6 3h12l-1 7a5 5 0 0 1-10 0zM6 7h12"/>','ti-calendar':'<path d="M4 5h16v16H4zM4 9h16M8 3v4M16 3v4"/>'};
  return '<svg viewBox="0 0 24 24">'+(I[name]||'')+'</svg>';
}

function buildSummary(){
  const lines=['STARA WINNA GÓRA — WINERY SETUP','TOKEN: '+state.token,'PARTNER: '+(state.name||'Małgorzata'),'EMAIL: '+(state.email||'—'),'LANG: '+lang.toUpperCase()];
  const p=countProgress();lines.push('PROGRESS: '+p.done+'/'+p.total+' ('+p.pct+'%)','');
  SECTIONS.forEach((s,i)=>{
    // Build this section's answered questions first; only print the header
    // (and the section) if at least one question has an answer or a file.
    const secLines=[];
    s.qs.forEach(q=>{
      const a=state.ans[q.id];let av='—';
      if(q.type==='single'&&a!=null)av=q.opts[lang][a];
      else if(q.type==='multi'&&Array.isArray(a)&&a.length)av=a.map(x=>q.opts[lang][x]).join(', ');
      else if((q.type==='text'||q.type==='textarea'||q.type==='number')&&a!=null&&String(a).trim())av=String(a);
      const okFiles=(state.files[q.id]||[]).filter(f=>f.status==='ok');
      // Skip unanswered questions with no uploaded files entirely.
      if(av==='—'&&okFiles.length===0)return;
      secLines.push('Q: '+q.q[lang]);secLines.push('A: '+av);
      okFiles.forEach(f=>{secLines.push('FILE: '+f.name+' → '+(f.signed_url||f.url));});
      secLines.push('');
    });
    if(secLines.length===0)return; // whole section empty → no header
    lines.push('━━━ '+(i+1)+'. '+s.title[lang]+' ━━━');
    lines.push(...secLines);
  });
  return lines.join('\n');
}
async function sendAll(){
  const summary=buildSummary();const p=countProgress();
  const payload={type:'winery_setup',winery:'Stara Winna Góra',token:state.token,name:state.name||'Małgorzata',email:state.email||'',lang:lang,progress:p.pct+'%',answers:state.ans,files:state.files,summary:summary,url:location.href,ts:new Date().toISOString()};
  try{await fetch('https://tt-stack-prod.onrender.com/api/partner-interest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}catch(e){}
  try{await fetch('https://formspree.io/f/xgobjyre',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({_subject:'Winery setup: Stara Winna Góra ('+p.pct+'%)',name:payload.name,email:payload.email,summary:summary})});}catch(e){}
  toast(UI[lang].sent+' '+UI[lang].sentb);
}
async function sendAsk(secId,secTitle){
  const inp=document.getElementById('ask-'+secId);const txt=inp.value.trim();if(!txt)return;
  try{await fetch('https://formspree.io/f/xgobjyre',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({_subject:'Question from Małgorzata — '+secTitle,name:state.name||'Małgorzata',email:state.email||'',question:txt,section:secTitle})});}catch(e){}
  inp.value='';toast(UI[lang].asksend+' ✓');
}

function openPrivacy(){document.getElementById('pm-ttl').textContent=PRIVACY[lang].title;document.getElementById('pm-body').textContent=PRIVACY[lang].body;document.getElementById('privacy-modal').classList.add('open');}
function closePrivacy(){document.getElementById('privacy-modal').classList.remove('open');}

function renderGate(){const p=PWD[lang];document.getElementById('g-ttl').textContent=p.title;document.getElementById('g-hint').textContent=p.hint;document.getElementById('g-btn').textContent=p.enter;}
function checkGate(){
  const v=document.getElementById('g-inp').value.trim();
  if(v===ACCESS_CODE){document.getElementById('gate').style.display='none';document.getElementById('email-gate').style.display='flex';renderEmailScreen();document.getElementById('e-inp').focus();try{sessionStorage.setItem('tt_gate','1');}catch(e){}}
  else{document.getElementById('g-err').textContent=PWD[lang].err;document.getElementById('g-inp').value='';}
}

const FAIL_MSG={pl:"Nie udało się załadować pytań. Odśwież stronę.",en:"Could not load the questions. Please refresh.",ru:"Не удалось загрузить вопросы. Обновите страницу."};

const lb=document.getElementById('lbar');
['pl','en','ru'].forEach(l=>{const b=document.createElement('button');b.className='lng'+(l==='pl'?' on':'');b.dataset.l=l;b.textContent=l.toUpperCase();b.onclick=()=>{lang=l;renderGate();renderEmailScreen();if(DATA&&loadedEmail)renderLang();};lb.appendChild(b);});

document.getElementById('g-inp').addEventListener('keydown',e=>{if(e.key==='Enter')checkGate();});
document.getElementById('e-inp').addEventListener('keydown',e=>{if(e.key==='Enter')submitEmail();});
renderGate();
// After the access-code gate (or a restored session) we show the EMAIL screen,
// not the form — the form is keyed by email and only renders once one is entered.
try{if(sessionStorage.getItem('tt_gate')==='1'){document.getElementById('gate').style.display='none';document.getElementById('email-gate').style.display='flex';renderEmailScreen();}}catch(e){}

// Questions live in a versioned JSON file (Variant A). Load them in the
// background; the form renders only after an email is entered (applyEmail).
let questionsReady = fetch('/winery-setup/questions.json',{cache:'no-cache'})
  .then(r=>{if(!r.ok)throw new Error('http '+r.status);return r.json();})
  .then(d=>{
    DATA=d;SECTIONS=DATA.sections;UI=DATA.ui;
    SECTIONS.forEach(s=>s.qs.forEach(q=>{QV[q.id]=q.v||1;}));
  })
  .catch(err=>{ DATA=null; });
