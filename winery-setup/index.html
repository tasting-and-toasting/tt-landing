<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasting & Toasting · Stara Winna Góra · Winery Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#160609;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#f5efe3;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:0 0 60px}
.hdr{background:#2d0d15;border-bottom:1px solid rgba(201,169,110,.2);padding:18px 28px 16px;position:sticky;top:0;z-index:20}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.brand img{height:34px;display:block}
.lang-bar{display:flex;gap:4px}
.lng{background:none;border:1px solid rgba(201,169,110,.25);border-radius:4px;padding:4px 9px;font-size:11px;color:#a08070;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.lng:hover,.lng.on{background:rgba(201,169,110,.15);border-color:#c9a96e;color:#f5efe3}
.hi{font-size:18px;font-weight:500;color:#f5efe3;margin-bottom:3px}
.intro{font-size:12.5px;color:#a08070;line-height:1.55;max-width:620px}
.prog-row{display:flex;align-items:center;gap:10px;margin-top:12px}
.prog-track{flex:1;height:5px;background:rgba(201,169,110,.12);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#c9a96e;width:0;transition:width .4s ease}
.prog-pct{font-size:11px;color:#c9a96e;font-weight:500;min-width:90px;text-align:right}
.body{padding:20px 28px 0}
.menu{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}
.mitem{background:#2d0d15;border:1px solid rgba(201,169,110,.18);border-radius:7px;padding:7px 11px;font-size:11.5px;color:#a08070;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.mitem:hover{border-color:rgba(201,169,110,.4);color:#f5efe3}
.mitem.active{border-color:#c9a96e;color:#f5efe3;background:#3a1520}
.mitem.done{color:#7fb89a}
.mdot{width:7px;height:7px;border-radius:50%;background:rgba(201,169,110,.3)}
.mitem.done .mdot{background:#5aa17e}
.sec{display:none}
.sec.active{display:block}
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sec-ico{width:34px;height:34px;border-radius:8px;background:#3a1520;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-ico svg{width:18px;height:18px;stroke:#c9a96e;fill:none;stroke-width:1.7}
.sec-no{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#c9a96e;font-weight:600;margin-bottom:2px}
.sec-ttl{font-size:17px;font-weight:500;color:#f5efe3;line-height:1.2}
.sec-intro{font-size:12.5px;color:#a08070;line-height:1.6;margin:10px 0 22px;padding:12px 14px;background:rgba(201,169,110,.05);border-left:2px solid rgba(201,169,110,.3);border-radius:0 6px 6px 0}
.qg{margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid rgba(201,169,110,.08)}
.qg:last-of-type{border-bottom:none}
.q-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px}
.q-txt{font-size:14px;font-weight:500;color:#f5efe3;line-height:1.4;flex:1}
.q-req{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:#a08070;background:rgba(201,169,110,.1);border-radius:4px;padding:2px 6px;white-space:nowrap}
.q-req.ok{color:#7fb89a;background:rgba(90,161,126,.12)}
.tip-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#c9a96e;cursor:pointer;margin-bottom:9px;user-select:none;border:none;background:none;font-family:inherit;padding:0}
.tip-btn:hover{text-decoration:underline}
.tip-box{display:none;font-size:12px;color:#c8b89a;line-height:1.6;background:rgba(201,169,110,.06);border-radius:6px;padding:10px 13px;margin-bottom:11px;border:1px solid rgba(201,169,110,.12)}
.tip-box.open{display:block}
.opts{display:flex;flex-wrap:wrap;gap:6px}
.opt{background:#2d0d15;border:1px solid rgba(201,169,110,.22);border-radius:20px;padding:7px 13px;font-size:12px;color:#c9a96e;cursor:pointer;transition:all .15s;user-select:none}
.opt:hover{border-color:#c9a96e;color:#f5efe3}
.opt.on{background:rgba(201,169,110,.18);border-color:#c9a96e;color:#f5efe3}
.inp{width:100%;background:#2d0d15;border:1px solid rgba(201,169,110,.22);border-radius:6px;padding:10px 12px;font-size:13px;color:#f5efe3;font-family:inherit;resize:vertical;outline:none;transition:border-color .15s}
.inp:focus{border-color:rgba(201,169,110,.55)}
.inp::placeholder{color:#5a3a2a}
.upl{margin-top:12px;padding:11px 13px;background:rgba(90,161,126,.05);border:1px dashed rgba(201,169,110,.3);border-radius:7px}
.upl-btn{display:inline-flex;align-items:center;gap:7px;background:rgba(201,169,110,.12);border:1px solid rgba(201,169,110,.35);border-radius:6px;padding:8px 14px;font-size:12px;color:#c9a96e;cursor:pointer;font-family:inherit;transition:all .15s}
.upl-btn:hover{background:rgba(201,169,110,.22);color:#f5efe3}
.upl-hint{font-size:10.5px;color:#7a5a48;margin-top:7px;line-height:1.4}
.upl-list{margin-top:9px;display:flex;flex-direction:column;gap:5px}
.upl-file{display:flex;align-items:center;gap:7px;font-size:11.5px;padding:5px 9px;background:#2d0d15;border-radius:5px;border:1px solid rgba(201,169,110,.15)}
.upl-file.ok{border-color:rgba(90,161,126,.4)}
.upl-file.err{border-color:rgba(184,80,66,.5)}
.upl-file .nm{flex:1;color:#c8b89a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upl-file .st{font-size:10px;color:#7fb89a}
.upl-file.err .st{color:#d88}
.upl-file .open{color:#c9a96e;text-decoration:none;font-size:10px}
.ask{margin-top:14px}
.ask-lbl{font-size:11px;color:#a08070;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ask-row{display:flex;gap:8px}
.ask-row .inp{flex:1}
.ask-btn{background:rgba(201,169,110,.15);border:1px solid rgba(201,169,110,.3);border-radius:6px;padding:0 16px;font-size:12px;color:#c9a96e;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.ask-btn:hover{background:rgba(201,169,110,.25);color:#f5efe3}
.nav{display:flex;justify-content:space-between;gap:10px;margin:24px 0 8px}
.btn{background:#c9a96e;border:none;border-radius:7px;padding:11px 22px;font-size:13.5px;font-weight:500;color:#1e0810;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn-ghost{background:none;border:1px solid rgba(201,169,110,.3);color:#a08070}
.btn-ghost:hover{color:#f5efe3;border-color:#c9a96e;opacity:1}
.gen-bar{position:sticky;bottom:0;background:#2d0d15;border-top:1px solid rgba(201,169,110,.2);padding:14px 28px;margin-top:30px;display:flex;align-items:center;justify-content:space-between;gap:14px;z-index:15}
.gen-info{font-size:11px;color:#a08070;line-height:1.4;flex:1}
.gen-btn{background:#c9a96e;border:none;border-radius:7px;padding:11px 20px;font-size:13px;font-weight:500;color:#1e0810;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .15s}
.gen-btn:hover{opacity:.88}
.save-flash{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#3a1520;border:1px solid #c9a96e;border-radius:20px;padding:7px 16px;font-size:11px;color:#c9a96e;opacity:0;transition:opacity .3s;pointer-events:none;z-index:30}
.save-flash.show{opacity:1}
.contact-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}
.contact-row .inp{height:42px}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#3a1520;border:1px solid #c9a96e;border-radius:10px;padding:14px 22px;font-size:13px;color:#f5efe3;opacity:0;transition:opacity .3s;pointer-events:none;z-index:40;max-width:90%;text-align:center}
.toast.show{opacity:1}
.footer{padding:24px 28px;text-align:center;border-top:1px solid rgba(201,169,110,.12);margin-top:30px}
.footer a{color:#c9a96e;font-size:12px;text-decoration:none;cursor:pointer}
.footer a:hover{text-decoration:underline}
.footer .cp{font-size:10.5px;color:#6a4a38;margin-top:8px}
.gate{position:fixed;inset:0;background:#160609;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-card{max-width:340px;width:100%;text-align:center}
.gate img{height:42px;margin-bottom:24px}
.gate-ttl{font-size:16px;font-weight:500;color:#f5efe3;margin-bottom:6px}
.gate-hint{font-size:12px;color:#a08070;margin-bottom:20px;line-height:1.5}
.gate-inp{width:100%;background:#2d0d15;border:1px solid rgba(201,169,110,.3);border-radius:8px;padding:14px;font-size:22px;color:#f5efe3;text-align:center;letter-spacing:8px;font-family:inherit;outline:none;margin-bottom:12px}
.gate-inp:focus{border-color:#c9a96e}
.gate-err{font-size:12px;color:#d88;margin-bottom:12px;min-height:16px}
.gate-btn{width:100%;background:#c9a96e;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:500;color:#1e0810;cursor:pointer;font-family:inherit}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;display:none;align-items:center;justify-content:center;padding:24px}
.modal.open{display:flex}
.modal-card{background:#2d0d15;border:1px solid rgba(201,169,110,.3);border-radius:12px;max-width:480px;width:100%;padding:24px;max-height:80vh;overflow-y:auto}
.modal-ttl{font-size:16px;font-weight:500;color:#c9a96e;margin-bottom:14px}
.modal-body{font-size:12.5px;color:#c8b89a;line-height:1.7;white-space:pre-line}
.modal-close{margin-top:18px;background:none;border:1px solid rgba(201,169,110,.3);border-radius:6px;padding:9px 18px;font-size:12px;color:#a08070;cursor:pointer;font-family:inherit}
.modal-close:hover{color:#f5efe3;border-color:#c9a96e}
@media(max-width:520px){.contact-row{grid-template-columns:1fr}.gen-bar{flex-direction:column;align-items:stretch}.gen-btn{width:100%}}
</style>
</head>

      let on=false;
      if(q.type==='single')on=ans===idx;else on=Array.isArray(ans)&&ans.includes(idx);
      h+='<span class="opt'+(on?' on':'')+'" data-qid="'+q.id+'" data-idx="'+idx+'" data-type="'+q.type+'">'+o+'</span>';
    });
    h+='</div>';
  }else if(q.type==='text'||q.type==='number'){
    h+='<input class="inp" data-qid="'+q.id+'" type="'+(q.type==='number'?'number':'text')+'" value="'+(ans!=null?String(ans).replace(/"/g,'&quot;'):'')+'" placeholder="...">';
  }else if(q.type==='textarea'){
    h+='<textarea class="inp" data-qid="'+q.id+'" rows="2" placeholder="...">'+(ans!=null?String(ans):'')+'</textarea>';
  }
  if(UPLOAD_QS[q.id]){
    const uu=UPLOAD_UI[lang];
    h+='<div class="upl"><label class="upl-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>'+UPLOAD_QS[q.id][lang]+'<input type="file" accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/jpeg,image/png" multiple style="display:none" onchange="handleUpload(event,\''+q.id+'\')"></label><div class="upl-hint">'+uu.hint+'</div><div class="upl-list" id="files-'+q.id+'"></div></div>';
  }
  h+='</div>';
  return h;
}
function bindInputs(){
  document.querySelectorAll('.opt[data-qid]').forEach(el=>{
    el.onclick=()=>{
      const qid=el.dataset.qid, idx=+el.dataset.idx, type=el.dataset.type;
      if(type==='single'){state.ans[qid]=idx;}
      else{if(!Array.isArray(state.ans[qid]))state.ans[qid]=[];const a=state.ans[qid];const p=a.indexOf(idx);if(p>=0)a.splice(p,1);else a.push(idx);}
      saveState();renderSections();renderMenu();renderProgress();
    };
  });
  document.querySelectorAll('input.inp[data-qid],textarea.inp[data-qid]').forEach(el=>{
    el.oninput=()=>{state.ans[el.dataset.qid]=el.value;saveState();updateQBadge(el.dataset.qid);renderProgress();};
    el.onblur=()=>{renderMenu();};
  });
}
function updateQBadge(qid){const g=document.querySelector('.qg[data-qid="'+qid+'"] .q-req');if(!g)return;const ok=isAnswered(qid);g.classList.toggle('ok',ok);g.textContent=ok?UI[lang].answered:UI[lang].unanswered;}
function toggleTip(btn){btn.nextElementSibling.classList.toggle('open');}
function goSec(i){cur=i;renderSections();renderMenu();window.scrollTo({top:0,behavior:'smooth'});}

function renderAllFiles(){SECTIONS.forEach(s=>s.qs.forEach(q=>{if(UPLOAD_QS[q.id])renderFiles(q.id);}));}
function renderFiles(qid){
  const box=document.getElementById('files-'+qid);if(!box)return;
  const list=state.files[qid]||[];box.innerHTML='';
  list.forEach((f,i)=>{
    const d=document.createElement('div');
    d.className='upl-file'+(f.status==='ok'?' ok':'')+(f.status==='err'?' err':'');
    let st=f.status==='ok'?UPLOAD_UI[lang].done:(f.status==='err'?UPLOAD_UI[lang].err:UPLOAD_UI[lang].uploading);
    let openLink=f.signed_url||f.url;
    d.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M13 2v7h7"/></svg><span class="nm">'+f.name+'</span><span class="st">'+st+'</span>'+(f.status==='ok'&&openLink?' <a class="open" href="'+openLink+'" target="_blank">↗</a>':'');
    box.appendChild(d);
  });
}
async function handleUpload(ev,qid){
  const files=[...ev.target.files];ev.target.value='';
  if(!state.files[qid])state.files[qid]=[];
  for(const file of files){
    if(!['application/pdf','image/jpeg','image/png'].includes(file.type)){toast(UPLOAD_UI[lang].err+': '+file.name);continue;}
    if(file.size>15*1024*1024){toast(UPLOAD_UI[lang].err+': >15MB');continue;}
    const rec={name:file.name,status:'up'};
    state.files[qid].push(rec);renderFiles(qid);
    try{
      const fd=new FormData();
      fd.append('file',file);fd.append('token',state.token);fd.append('question',qid);fd.append('original_name',file.name);
      const r=await fetch(UPLOAD_ENDPOINT,{method:'POST',body:fd});
      const j=await r.json();
      if(j.ok){rec.status='ok';rec.url=j.url;rec.signed_url=j.signed_url||null;}
      else{rec.status='err';}
    }catch(e){rec.status='err';}
    saveState();renderFiles(qid);renderMenu();renderProgress();updateQBadge(qid);
  }
}

function iconSvg(name){
  const I={'ti-plant-2':'<path d="M3 17h18M5 17c0-5 5-7 7-7M19 12c0 2-2 5-7 5M12 22V10"/>','ti-flask':'<path d="M9 3h6M10 3v6l-5 9a2 2 0 0 0 2 3h10a2 2 0 0 0 2-3l-5-9V3"/>','ti-list-numbers':'<path d="M11 6h10M11 12h10M11 18h10M4 6h1v4M4 10h2M6 18H4l2-3H4"/>','ti-qrcode':'<path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z"/>','ti-users':'<path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2M16 3.5a4 4 0 0 1 0 7M21 21v-2a4 4 0 0 0-3-3.8"/>','ti-shield-check':'<path d="M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6zM9 12l2 2 4-4"/>','ti-stamp':'<path d="M8 9V6a4 4 0 0 1 8 0v3M5 21h14M6 21v-3a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v3"/>','ti-books':'<path d="M5 4h3v16H5zM10 4h3v16h-3zM16 5l3 .8L16 21l-3-.8z"/>','ti-shopping-cart':'<path d="M6 6h15l-2 9H8zM6 6L5 3H3M9 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2zM18 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>','ti-glass-full':'<path d="M8 21h8M12 15v6M6 3h12l-1 7a5 5 0 0 1-10 0zM6 7h12"/>','ti-calendar':'<path d="M4 5h16v16H4zM4 9h16M8 3v4M16 3v4"/>'};
  return '<svg viewBox="0 0 24 24">'+(I[name]||'')+'</svg>';
}

function buildSummary(){
  const lines=['STARA WINNA GÓRA — WINERY SETUP','TOKEN: '+state.token,'PARTNER: '+(state.name||'Małgorzata'),'EMAIL: '+(state.email||'—'),'LANG: '+lang.toUpperCase()];
  const p=countProgress();lines.push('PROGRESS: '+p.done+'/'+p.total+' ('+p.pct+'%)','');
  SECTIONS.forEach((s,i)=>{
    lines.push('━━━ '+(i+1)+'. '+s.title[lang]+' ━━━');
    s.qs.forEach(q=>{
      const a=state.ans[q.id];let av='—';
      if(q.type==='single'&&a!=null)av=q.opts[lang][a];
      else if(q.type==='multi'&&Array.isArray(a)&&a.length)av=a.map(x=>q.opts[lang][x]).join(', ');
      else if((q.type==='text'||q.type==='textarea'||q.type==='number')&&a!=null&&String(a).trim())av=String(a);
      lines.push('Q: '+q.q[lang]);lines.push('A: '+av);
      const fl=state.files[q.id]||[];
      fl.filter(f=>f.status==='ok').forEach(f=>{lines.push('FILE: '+f.name+' → '+(f.signed_url||f.url));});
      lines.push('');
    });
  });
  return lines.join('\n');
}
async function sendAll(){
  const summary=buildSummary();const p=countProgress();
  const payload={type:'winery_setup',winery:'Stara Winna Góra',token:state.token,name:state.name||'Małgorzata',email:state.email||'',lang:lang,progress:p.pct+'%',answers:state.ans,files:state.files,summary:summary,url:location.href,ts:new Date().toISOString()};
  try{await fetch('https://tt-stack-prod.onrender.com/api/partner-interest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}catch(e){}
  try{await fetch('https://formspree.io/f/xgobjyre',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({_subject:'Winery setup: Stara Winna Góra ('+p.pct+'%)',name:payload.name,email:payload.email,summary:summary})});}catch(e){}
  toast(UI[lang].sent+' '+UI[lang].sentb);
}
async function sendAsk(secId,secTitle){
  const inp=document.getElementById('ask-'+secId);const txt=inp.value.trim();if(!txt)return;
  try{await fetch('https://formspree.io/f/xgobjyre',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({_subject:'Question from Małgorzata — '+secTitle,name:state.name||'Małgorzata',email:state.email||'',question:txt,section:secTitle})});}catch(e){}
  inp.value='';toast(UI[lang].asksend+' ✓');
}

function openPrivacy(){document.getElementById('pm-ttl').textContent=PRIVACY[lang].title;document.getElementById('pm-body').textContent=PRIVACY[lang].body;document.getElementById('privacy-modal').classList.add('open');}
function closePrivacy(){document.getElementById('privacy-modal').classList.remove('open');}

function renderGate(){const p=PWD[lang];document.getElementById('g-ttl').textContent=p.title;document.getElementById('g-hint').textContent=p.hint;document.getElementById('g-btn').textContent=p.enter;}
function checkGate(){
  const v=document.getElementById('g-inp').value.trim();
  if(v===ACCESS_CODE){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';try{sessionStorage.setItem('tt_gate','1');}catch(e){}}
  else{document.getElementById('g-err').textContent=PWD[lang].err;document.getElementById('g-inp').value='';}
}

const lb=document.getElementById('lbar');
['pl','en','ru'].forEach(l=>{const b=document.createElement('button');b.className='lng'+(l==='pl'?' on':'');b.dataset.l=l;b.textContent=l.toUpperCase();b.onclick=()=>{lang=l;renderGate();renderLang();};lb.appendChild(b);});

document.getElementById('g-inp').addEventListener('keydown',e=>{if(e.key==='Enter')checkGate();});
renderGate();
try{if(sessionStorage.getItem('tt_gate')==='1'){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';}}catch(e){}
renderLang();
</script>
