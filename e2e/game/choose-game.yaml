# =============================================================================
# TT-019 Choose Game QA smoke.
# Covers iOS Choose Game entry, expandable Blind Tasting card, navigation to
# /v2/game-settings, locked-card alert, back-to-hub behavior, and EN/RU/ES copy.
# =============================================================================
appId: Tasting.And.Toasting
---
- clearState
- launchApp:
    appId: Tasting.And.Toasting
    stopApp: false
- waitForAnimationToEnd:
    timeout: 3000
- launchApp:
    appId: Tasting.And.Toasting
    stopApp: false
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      id: "welcome-create-account-btn"
    timeout: 30000
- tapOn:
    id: "welcome-create-account-btn"
- extendedWaitUntil:
    visible:
      id: "signup-name-input"
    timeout: 15000
- tapOn:
    id: "signup-name-input"
- inputText: "Judge"
- tapOn:
    id: "signup-email-input"
- inputText: "judge1-tt019-20260515b@e2e.test"
- tapOn:
    id: "signup-password-input"
- inputText: "TestPass1234"
- hideKeyboard
- tapOn:
    id: "signup-submit"
- extendedWaitUntil:
    visible:
      id: "onboarding-modal"
    timeout: 15000
- tapOn:
    id: "onboarding-close"

# i18n: EN
- tapOn:
    id: "tab-profile"
- tapOn:
    id: "language-switcher-trigger"
- tapOn:
    id: "language-switcher-option-en"
- tapOn:
    id: "tab-games"
- tapOn:
    id: "games-new-btn"
- extendedWaitUntil:
    visible:
      id: "choose-game-screen"
    timeout: 8000
- assertVisible: "Choose a game"
- assertVisible:
    id: "choose-game-card-blind-tasting"
- assertVisible:
    id: "choose-game-card-blind-detective"
- assertVisible:
    id: "choose-game-card-blitz"
- assertVisible:
    id: "choose-game-card-wine-quiz"

# i18n: RU
- tapOn:
    id: "choose-game-back"
- tapOn:
    id: "tab-profile"
- tapOn:
    id: "language-switcher-trigger"
- tapOn:
    id: "language-switcher-option-ru"
- tapOn:
    id: "tab-games"
- tapOn:
    id: "games-new-btn"
- extendedWaitUntil:
    visible: "Выбери игру"
    timeout: 8000

# Locked card should raise the localized native alert.
- tapOn:
    id: "choose-game-card-blitz"
- extendedWaitUntil:
    visible: "Скоро доступно"
    timeout: 5000
- tapOn: "OK"

# Blind Tasting expands, then its CTA navigates to /v2/game-settings.
- tapOn:
    id: "choose-game-card-blind-tasting"
- extendedWaitUntil:
    visible:
      id: "game-card-cta-blind_tasting"
    timeout: 5000
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: "game-card-cta-blind_tasting"
- extendedWaitUntil:
    visible: "Красное"
    timeout: 10000
- tapOn:
    id: "bottom-tab-games"
- assertVisible:
    id: "games-new-btn"

# i18n: ES
- tapOn:
    id: "tab-profile"
- tapOn:
    id: "language-switcher-trigger"
- tapOn:
    id: "language-switcher-option-es"
- tapOn:
    id: "tab-games"
- tapOn:
    id: "games-new-btn"
- extendedWaitUntil:
    visible: "Elige un juego"
    timeout: 8000
- assertVisible: "Cata a ciegas"
- assertVisible: "Trivia del vino"
